version: "3.8"

services:
  analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - LOG_LEVEL=debug
    volumes:
      - ../src:/app/src
      - ../docs:/app/docs
      - ../scripts:/app/scripts
      - ../examples:/app/examples
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
